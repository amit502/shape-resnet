# feature-vis-job.yaml
# ─────────────────────────────────────────────────────────────
# Generates feature map visualization figure for the paper.
#
# 3 rows × 4 cols:
#   Row 0: Shape-ResNet-18, clean car image
#   Row 1: Shape-ResNet-18, corrupted (severity 4)
#   Row 2: Baseline ResNet-18, corrupted (severity 4)
#
#   Cols: input | stage1 | stage2 | stage3
#
# Output: /pvc/results/figures/feature_vis_<corruption>_sev4.pdf/.png
#
# Submit: kubectl apply -f feature-vis-job.yaml -n kc-ai-research-lab
# Logs:   kubectl logs -f job/shape-feature-vis -n kc-ai-research-lab
# Delete: kubectl delete job shape-feature-vis -n kc-ai-research-lab
# ─────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: shape-feature-vis
  namespace: kc-ai-research-lab
spec:
  backoffLimit: 0

  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-RTX-5000-Ada-Generation

      containers:
        - name: vis
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "=========================================="
              echo "  Cloning repo (branch: main)"
              echo "=========================================="
              apt-get update -qq && apt-get install -y -qq git
              git clone \
                --branch main \
                --single-branch \
                https://${GITHUB_PAT}@github.com/amit502/shape-resnet.git \
                /shape-resnet
              cd /shape-resnet

              pip install -r requirements.txt --quiet
              pip install matplotlib --quiet

              mkdir -p /pvc/results/figures

              echo "=========================================="
              echo "  Generating feature map visualization"
              echo "=========================================="
              python visualize_features.py \
                --data_dir    /pvc/cifar10 \
                --ckpt_shape  /pvc/checkpoints/cifar-sweep/seed-42/shape_res18_cifar10.pt \
                --ckpt_base   /pvc/checkpoints/cifar-sweep/seed-42/baseline_res18_cifar10.pt \
                --corruption  gaussian_noise \
                --severity    4 \
                --car_idx     0 \
                --out_dir     /pvc/results/figures

              echo "=========================================="
              echo "  Done. Output files:"
              echo "=========================================="
              ls -lh /pvc/results/figures/feature_vis_*

          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"

          env:
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: data
              mountPath: /pvc
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shape-resnet-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
