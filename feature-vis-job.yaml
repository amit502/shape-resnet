# feature-vis-job.yaml
# ─────────────────────────────────────────────────────────────
# Step 1: Train baseline_res18 and shape_res18 on CIFAR-10 (40 epochs)
# Step 2: Generate feature map visualization figures for the paper.
#
# Figure 1 — Car (3 rows × 4 cols):
#   Row 0: Shape-ResNet-18, clean
#   Row 1: Shape-ResNet-18, corrupted (severity 4)
#   Row 2: Baseline ResNet-18, corrupted (severity 4)
#   Cols: input | stage1 | stage2 | stage3
#
# Figure 2 — Horse (3 rows × 6 cols):
#   Rows: input | Shape-ResNet-18 stage1 | Baseline layer1
#   Cols: clean | severity 1-5
#
# Output: /pvc/results/figures/
#
# Submit: kubectl apply -f feature-vis-job.yaml -n <YOUR_NAMESPACE>
# Logs:   kubectl logs -f job/shape-feature-vis -n <YOUR_NAMESPACE>
# Delete: kubectl delete job shape-feature-vis -n <YOUR_NAMESPACE>
# ─────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: shape-feature-vis
  namespace: <YOUR_NAMESPACE>
spec:
  backoffLimit: 0

  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-RTX-5000-Ada-Generation

      containers:
        - name: vis
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "=========================================="
              echo "  Cloning repo (branch: main)"
              echo "=========================================="
              apt-get update -qq && apt-get install -y -qq git
              git clone \
                --branch main \
                --single-branch \
                https://${GITHUB_PAT}@github.com/<YOUR_USERNAME>/shape-resnet.git \
                /shape-resnet
              cd /shape-resnet

              pip install -r requirements.txt --quiet
              pip install matplotlib --quiet

              mkdir -p /pvc/results/figures

              echo "=========================================="
              echo "  Generating feature map figures"
              echo "=========================================="
              python visualize_features.py \
                --data_dir    /pvc/cifar10 \
                --ckpt_shape  /pvc/checkpoints/feature-vis/shape_res18_cifar10.pt \
                --ckpt_base   /pvc/checkpoints/feature-vis/baseline_res18_cifar10.pt \
                --corruption  gaussian_noise \
                --severity    4 \
                --car_idx     0 \
                --out_dir     /pvc/results/figures

              echo "=========================================="
              echo "  Done. Output files:"
              echo "=========================================="
              ls -lh /pvc/results/figures/

          resources:
            requests:
              cpu: "3"
              memory: "10Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "3"
              memory: "12Gi"
              nvidia.com/gpu: "1"

          env:
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: <YOUR_PAT_SECRET>
                  key: token
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: data
              mountPath: /pvc
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: <YOUR_PVC_NAME>
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
