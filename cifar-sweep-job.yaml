# cifar-sweep-job.yaml
# ─────────────────────────────────────────────────────────────
# Full CIFAR sweep: baseline + ShapeBiasNet on CIFAR-10 and CIFAR-100
#
# Models : baseline_res18 / baseline_res50 / shape_res18 / shape_res50
# Dataset: cifar10, cifar100
# Seeds  : 42 / 23 / 17
# Total  : 4 models x 2 datasets x 3 seeds = 24 runs (~12 hours)
#
# Checkpoints : /pvc/checkpoints/cifar-sweep/seed-{SEED}/
# Results     : /pvc/results/cifar-sweep/seed-{SEED}/
#
# Submit:  kubectl apply -f cifar-sweep-job.yaml
# Logs:    kubectl logs -f job/shape-cifar-sweep -n kc-ai-research-lab
# Delete:  kubectl delete job shape-cifar-sweep -n kc-ai-research-lab
# ─────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: shape-cifar-sweep
  namespace: kc-ai-research-lab
spec:
  backoffLimit: 0

  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-RTX-5000-Ada-Generation

      containers:
        - name: pipeline
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "=========================================="
              echo "  Cloning repo (branch: shape-res-final)"
              echo "=========================================="
              apt-get update -qq && apt-get install -y -qq git
              git clone \
                --branch main \
                --single-branch \
                https://${GITHUB_PAT}@github.com/amit502/shape-resnet.git \
                /shape-resnet
              cd /shape-resnet

              pip install -r requirements.txt --quiet
              nvidia-smi

              set +e

              MODELS="baseline_res18 baseline_res50 shape_res18 shape_res50"
              SEEDS="42 23 17"
              PASS=0
              FAIL=0

              for SEED in $SEEDS; do
                for DATASET in cifar10 cifar100; do
                  DATA_DIR="/pvc/${DATASET}"
                  CKPT_DIR="/pvc/checkpoints/cifar-sweep/seed-${SEED}"
                  RESULTS_DIR="/pvc/results/cifar-sweep/seed-${SEED}"
                  mkdir -p "$CKPT_DIR" "$RESULTS_DIR"

                  for MODEL in $MODELS; do
                    echo ""
                    echo "============================================================"
                    echo "  MODEL=$MODEL  DATASET=$DATASET  SEED=$SEED"
                    echo "============================================================"

                    rm -f "$CKPT_DIR/${MODEL}_${DATASET}.pt"

                    python -u train.py \
                      --model    $MODEL \
                      --dataset  $DATASET \
                      --data_dir $DATA_DIR \
                      --ckpt_dir $CKPT_DIR \
                      --epochs   40 \
                      --batch    128 \
                      --workers  4 \
                      --seed     $SEED
                    TRAIN_STATUS=$?

                    if [ $TRAIN_STATUS -ne 0 ]; then
                      echo "  [ERROR] Training failed — skipping eval."
                      FAIL=$((FAIL + 1))
                      continue
                    fi

                    python -u eval.py \
                      --model       $MODEL \
                      --dataset     $DATASET \
                      --data_dir    $DATA_DIR \
                      --ckpt_dir    $CKPT_DIR \
                      --results_dir $RESULTS_DIR \
                      --batch       128 \
                      --workers     4
                    EVAL_STATUS=$?

                    if [ $EVAL_STATUS -ne 0 ]; then
                      echo "  [WARN] Eval failed for $MODEL $DATASET seed=$SEED"
                      FAIL=$((FAIL + 1))
                    else
                      PASS=$((PASS + 1))
                      echo "  [OK] $MODEL $DATASET seed=$SEED done."
                    fi
                  done
                done
              done

              echo ""
              echo "============================================================"
              echo "  Sweep complete.  Passed: $PASS   Failed: $FAIL"
              echo "============================================================"
              ls /pvc/results/cifar-sweep/

          resources:
            requests:
              cpu: "3"
              memory: "9Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "3"
              memory: "10Gi"
              nvidia.com/gpu: "1"

          env:
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: data
              mountPath: /pvc
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shape-resnet-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
